<meta name="apple-mobile-web-app-title" content="Fusion Studio">
<meta name="theme-color" content="#0a0a0b">

<style>
:root {
  --bg:#0a0a0b; --surface:#111113; --surface2:#18181b; --surface3:#222226;
  --border:#2a2a2f; --border2:#38383f;
  --orange:#f05a28; --orange2:#ff7043; --orange-dim:rgba(240,90,40,0.15); --orange-dim2:rgba(240,90,40,0.08);
  --text:#f0f0f0; --text2:#a0a0a8; --text3:#68686f;
  --green:#22c55e; --red:#ef4444; --blue:#3b82f6; --yellow:#f59e0b; --gold:#f59e0b;
  --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overscroll-behavior:none;}
body{max-width:480px;margin:0 auto;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,11,0.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
.nav-logo{width:36px;height:36px;border-radius:50%;border:2px solid var(--orange);overflow:hidden;flex-shrink:0;user-select:none;-webkit-touch-callout:none;-webkit-user-select:none;touch-action:manipulation;position:relative;background-size:cover;background-position:center;}
.nav-logo::after{content:'';position:absolute;inset:0;z-index:1;}
.nav-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;}
.nav-title span{color:var(--orange);}
.nav-back{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text);}
.nav-back:active{background:var(--surface3);}
.nav-spacer{width:36px;}
.nav-user{display:flex;align-items:center;gap:8px;cursor:pointer;}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--orange-dim);border:1px solid rgba(240,90,40,0.4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--orange);flex-shrink:0;}

/* PAGES */
.page{padding:20px 16px 48px;animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* AUTH SCREENS */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.auth-logo{width:96px;height:96px;border-radius:50%;border:3px solid var(--orange);overflow:hidden;margin-bottom:20px;box-shadow:0 0 40px rgba(240,90,40,0.3);background-size:cover;background-position:center;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
.auth-title{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;letter-spacing:3px;text-align:center;margin-bottom:4px;}
.auth-title span{color:var(--orange);}
.auth-subtitle{font-size:13px;color:var(--text2);text-align:center;margin-bottom:32px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;width:100%;max-width:360px;}
.auth-card-title{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;letter-spacing:1.5px;margin-bottom:18px;color:var(--text);}
.auth-inp{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;height:48px;border-radius:var(--radius-sm);padding:0 14px;outline:none;transition:border-color .15s;margin-bottom:12px;}
.auth-inp:focus{border-color:var(--orange);}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--orange),var(--orange2));color:white;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;padding:14px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:transform .1s;margin-top:4px;}
.auth-btn:active{transform:scale(0.98);}
.auth-link{font-size:13px;color:var(--text2);text-align:center;margin-top:16px;cursor:pointer;}
.auth-link span{color:var(--orange);font-weight:600;}
.auth-err{font-size:12px;color:var(--red);margin-bottom:10px;padding:8px 12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:6px;}

/* PENDING SCREEN */
.pending-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;gap:16px;}
.pending-icon{font-size:64px;line-height:1;}
.pending-title{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px;color:var(--yellow);}
.pending-text{font-size:14px;color:var(--text2);line-height:1.6;max-width:300px;}
.pending-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;padding:10px 20px;border-radius:30px;cursor:pointer;margin-top:8px;}

/* HOME */
.home-hero{text-align:center;padding:20px 0 24px;}
.home-hero h1{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;letter-spacing:3px;line-height:1.1;}
.home-hero h1 span{color:var(--orange);}
.home-hero p{font-size:13px;color:var(--text2);margin-top:5px;}
.home-greeting{font-size:13px;color:var(--text3);margin-bottom:2px;letter-spacing:.5px;}
.weeks-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;cursor:pointer;transition:border-color .2s,transform .1s;display:flex;flex-direction:column;gap:10px;}
.week-card:active{transform:scale(0.97);}
.week-card:hover{border-color:var(--orange);}
.week-card-header{display:flex;align-items:center;gap:10px;}
.week-icon{width:38px;height:38px;border-radius:50%;background:var(--orange-dim);border:1px solid rgba(240,90,40,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.week-label{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:1px;}
.week-sub{font-size:11px;color:var(--text3);}
.progress-bar-wrap{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--orange),var(--orange2));transition:width .5s ease;}
.progress-bar-fill.complete{background:var(--green);}
.week-pct{font-size:10px;color:var(--text3);font-weight:500;}

/* DAY / BLOCK */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.page-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-align:center;flex:1;}
.page-subtitle{font-size:11px;color:var(--orange);text-align:center;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;cursor:pointer;transition:border-color .2s,transform .1s;margin-bottom:12px;display:flex;align-items:center;gap:14px;}
.day-card:active{transform:scale(0.98);}
.day-card:hover{border-color:var(--orange);}
.day-icon-wrap{width:48px;height:48px;border-radius:12px;background:var(--orange-dim);border:1px solid rgba(240,90,40,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;}
.day-info{flex:1;}
.day-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:1px;}
.day-days{font-size:12px;color:var(--text2);margin-top:2px;}
.block-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;cursor:pointer;transition:border-color .2s,transform .1s;display:flex;align-items:center;gap:16px;margin-bottom:12px;}
.block-card:active{transform:scale(0.98);}
.block-card:hover{border-color:var(--orange);}
.block-icon-wrap{width:56px;height:56px;border-radius:14px;background:var(--orange-dim);border:1px solid rgba(240,90,40,0.3);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;transition:transform .2s;}
.block-card:hover .block-icon-wrap{transform:scale(1.08);}
.block-name{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;}
.block-detail{font-size:12px;color:var(--text2);margin-top:4px;}

/* WORKOUT */
.workout-header{position:sticky;top:0;z-index:90;background:rgba(10,10,11,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.workout-info{text-align:center;flex:1;}
.workout-week{font-size:10px;color:var(--orange);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.workout-block{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:1.5px;}
.workout-content{padding:16px 16px 64px;}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.ex-header{background:var(--surface2);padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.ex-order{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--orange);flex-shrink:0;line-height:1.1;}
.ex-name{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:.5px;line-height:1.3;}
.combined-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:var(--orange-dim);color:var(--orange);border:1px solid rgba(240,90,40,.3);border-radius:4px;padding:2px 7px;margin-bottom:5px;}
.sets-wrap{padding:10px 12px 12px;}
.set-row{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;transition:border-color .2s,background .2s;}
.set-row.done{background:var(--orange-dim2);border-color:rgba(240,90,40,.35);}
.set-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.set-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
.set-target{font-size:12px;font-weight:700;background:var(--surface3);border-radius:5px;padding:3px 8px;display:flex;align-items:center;gap:5px;}
.set-target-rpe{color:var(--orange);font-size:11px;}
.set-inputs{display:flex;align-items:center;gap:8px;}
.inp-kg{width:68px;flex-shrink:0;background:var(--surface3);border:1px solid var(--border2);color:var(--text);font-family:'Inter',sans-serif;font-size:16px;font-weight:700;text-align:center;height:42px;border-radius:var(--radius-sm);outline:none;transition:border-color .15s;}
.inp-kg:focus{border-color:var(--orange);}
.inp-notes{flex:1;min-width:0;background:var(--surface3);border:1px solid var(--border2);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;height:42px;border-radius:var(--radius-sm);padding:0 10px;outline:none;transition:border-color .15s;}
.inp-notes::placeholder{color:var(--text3);font-size:12px;}
.inp-notes:focus{border-color:var(--orange);}
.btn-check{width:42px;height:42px;flex-shrink:0;border:none;border-radius:var(--radius-sm);background:var(--surface3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;}
.btn-check:active{transform:scale(0.88);}
.btn-check.checked{background:var(--orange);}
.superset-set-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:8px;}
.superset-set-header{background:var(--surface3);padding:6px 12px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.superset-part{padding:10px 12px;border-bottom:1px solid var(--border);}
.superset-part:last-child{border-bottom:none;}
.superset-part-name{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.superset-part-name span{flex:1;line-height:1.3;}
.superset-part.part-done{background:var(--orange-dim2);}
.finish-btn{width:100%;background:linear-gradient(135deg,var(--orange),var(--orange2));color:white;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;padding:16px;border:none;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 8px 24px rgba(240,90,40,0.3);transition:transform .15s;margin-top:20px;}
.finish-btn:active{transform:scale(0.97);}

/* USER MENU */
.user-menu-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.5);}
.user-menu{position:fixed;top:60px;right:calc(50% - 230px);background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:6px;z-index:151;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:fadeIn .15s ease;}
@media(max-width:480px){.user-menu{right:12px;}}
.user-menu-item{padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;transition:background .15s;color:var(--text);}
.user-menu-item:hover{background:var(--surface2);}
.user-menu-item.danger{color:var(--red);}
.user-menu-sep{height:1px;background:var(--border);margin:4px 0;}
.user-menu-name{padding:10px 14px 6px;font-size:12px;color:var(--text3);font-weight:600;letter-spacing:.5px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;border-radius:18px 18px 0 0;}
.modal-title{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;letter-spacing:1.5px;color:var(--orange);}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:18px;}

/* ADMIN */
.admin-nav{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;}
.admin-nav::-webkit-scrollbar{height:3px;} .admin-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.admin-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.admin-tab.active{background:var(--orange);border-color:var(--orange);color:white;}
.admin-section-title{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* USER MANAGEMENT */
.user-row{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.user-row-avatar{width:38px;height:38px;border-radius:50%;background:var(--orange-dim);border:1px solid rgba(240,90,40,0.3);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--orange);flex-shrink:0;}
.user-row-info{flex:1;min-width:0;}
.user-row-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-row-email{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-row-actions{display:flex;gap:6px;flex-shrink:0;}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;}
.badge-pending{background:rgba(245,158,11,0.15);color:var(--yellow);border:1px solid rgba(245,158,11,0.3);}
.badge-active{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
.badge-blocked{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25);}

/* PROGRESS VIEW */
.prog-user-select{margin-bottom:16px;}
.prog-week-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;}
.prog-week-tabs::-webkit-scrollbar{height:3px;} .prog-week-tabs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.prog-week-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.prog-week-tab.active{background:var(--orange);border-color:var(--orange);color:white;}
.prog-entry{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;}
.prog-entry-header{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.prog-entry-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.prog-entry-label{font-size:12px;color:var(--text2);flex:1;}
.prog-entry-val{font-size:13px;font-weight:700;color:var(--orange);}
.prog-entry-notes{font-size:11px;color:var(--text3);font-style:italic;margin-top:3px;}
.prog-entry-done{color:var(--green);font-size:11px;font-weight:700;}

/* ADMIN FORM */
.adm-inp{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;height:40px;border-radius:var(--radius-sm);padding:0 12px;outline:none;margin-bottom:8px;transition:border-color .15s;}
.adm-inp:focus{border-color:var(--orange);}
.adm-inp-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.adm-inp-row .adm-inp{margin-bottom:0;flex:1;}
.adm-inp-row label{font-size:11px;color:var(--text3);white-space:nowrap;}
.adm-btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;}
.adm-btn:active{transform:scale(0.97);}
.adm-btn-orange{background:var(--orange);color:white;}
.adm-btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.adm-btn-red{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.adm-btn-green{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.adm-btn-blue{background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}
.ex-edit-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;}
.ex-edit-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ex-edit-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.part-edit-card{background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px;}
.part-edit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.part-label{font-size:11px;color:var(--orange);font-weight:700;}
.type-toggle{display:flex;gap:6px;margin-bottom:10px;}
.type-btn{flex:1;padding:6px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.type-btn.active{background:var(--orange-dim);border-color:var(--orange);color:var(--orange);}
.pw-wrap{display:flex;flex-direction:column;gap:12px;}
.pw-wrap h3{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:1px;}
.pw-wrap p{font-size:13px;color:var(--text2);}
.pw-err{font-size:12px;color:var(--red);}

/* BOTTOM TAB BAR */
.tab-bar{display:flex;border-top:1px solid var(--border);background:rgba(10,10,11,0.97);position:sticky;bottom:0;z-index:50;}
.tab-bar-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;cursor:pointer;font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;transition:color .15s;}
.tab-bar-item.active{color:var(--orange);}
.tab-bar-icon{font-size:20px;line-height:1;}
/* Pages with tab bar need bottom padding */
.page-tabbed{padding:20px 16px 80px;}

/* PR SCREEN */
.pr-hero{background:linear-gradient(135deg,var(--orange-dim),rgba(240,90,40,0.04));border:1px solid rgba(240,90,40,0.3);border-radius:var(--radius);padding:18px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.pr-hero-icon{font-size:36px;line-height:1;flex-shrink:0;}
.pr-hero-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.pr-hero-name{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.pr-hero-weight{font-family:'Oswald',sans-serif;font-size:40px;font-weight:700;color:var(--orange);line-height:1;}
.pr-hero-meta{font-size:11px;color:var(--text3);margin-top:3px;}
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.pr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;position:relative;overflow:hidden;}
.pr-card.has-new{border-color:var(--gold);}
.pr-new-badge{position:absolute;top:0;right:0;background:var(--gold);color:#000;font-size:8px;font-weight:800;letter-spacing:.5px;padding:3px 7px;border-radius:0 0 0 6px;}
.pr-card-name{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:8px;line-height:1.3;}
.pr-ranges{display:flex;flex-direction:column;gap:5px;}
.pr-range-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pr-range-label{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.5px;width:36px;flex-shrink:0;}
.pr-range-val{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--text);}
.pr-range-val span{font-size:11px;color:var(--text3);}
.pr-range-week{font-size:10px;color:var(--text3);}
.pr-range-new{font-size:9px;font-weight:800;color:var(--gold);background:rgba(245,158,11,0.12);border-radius:3px;padding:1px 5px;}
.pr-empty{text-align:center;padding:28px 0;color:var(--text3);font-size:13px;}

/* CHART SCREEN */
.chart-ex-selector{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.chart-ex-name{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:.5px;}
.chart-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.chart-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;}
.chart-stat-label{font-size:9px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.chart-stat-val{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;}
.chart-stat-val.hi{color:var(--orange);}
.chart-stat-val.gr{color:var(--green);}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px 10px;margin-bottom:14px;}
.chart-wrap-title{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.chart-svg{width:100%;overflow:visible;}
.chart-week-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.chart-week-tabs::-webkit-scrollbar{height:3px;} .chart-week-tabs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

<script>
// ============================================================
// LOGO
// ============================================================
// Resolve logo URL relative to the HTML file location (works on GitHub Pages subdirectories)
const LOGO_URL = (()=>{
  const base = window.location.href.replace(/\/[^\/]*$/, '/');
  return base + 'logo.jpg';
})();

// ============================================================
// CONSTANTS & KEYS
// ============================================================
const K = {
  USERS:    'fs_users_v1',
  PLAN:     'fs_plan_v1',
  PROG:     (uid) => `fs_prog_${uid}_v1`,
  PRS:      (uid) => `fs_prs_${uid}_v1`,   // personal: {exName: {rm1,rm2,rm3,rm4}} each = {weight,week,newPr}
  TRACKED:  'fs_tracked_v1',               // shared: [{name, matchTerms:[]}]
  SESSION:  'fs_session_v1',
  ADMINPW:  'fs_adminpw_v1',
  RPE_INFO: 'fs_rpe_info_v1',
};
const DEFAULT_ADMIN_PW = 'fusion2025';
const STATUS = { PENDING:'pending', ACTIVE:'active', BLOCKED:'blocked' };

// PR rep ranges
const PR_RANGES = [
  { key:'rm1', label:'1RM',  min:1, max:1 },
  { key:'rm2', label:'2RM',  min:2, max:2 },
  { key:'rm3', label:'3RM',  min:3, max:3 },
  { key:'rm4', label:'4RM+', min:4, max:999 },
];

// Default tracked exercises — matchTerms use exact-ish matching to avoid false positives
// "peso muerto" alone would match "peso muerto rumano" — so we use exact boundary matching in matchTracked
const DEFAULT_TRACKED = [
  { name:'Banco Plano',  matchTerms:['banco plano'], exact:true },
  { name:'Back Squat',   matchTerms:['back squat con target','back squat'], exact:true },
  { name:'Peso Muerto',  matchTerms:['peso muerto'], exact:true },
];

// Parse reps string like "6", "4/8", "6 c/l", "20\"/30\"" → number or null
function parseReps(rStr){
  if(!rStr) return null;
  const s = rStr.toString().trim();
  // Take first number found
  const m = s.match(/\d+/);
  return m ? parseInt(m[0]) : null;
}

// Get PR range key for a given rep count
function getPrRangeKey(reps){
  if(!reps) return null;
  const r = PR_RANGES.find(r => reps >= r.min && reps <= r.max);
  return r ? r.key : null;
}

// Match exercise name against tracked terms
// Rules:
//   ✅ "Banco Plano C/Barra (Pausa 1\")"  → matches "banco plano" (C/ is abbreviation, not a new word)
//   ✅ "Peso Muerto C/Pausa 2\""          → matches "peso muerto"
//   ✅ "Back Squat (Pausa 2\" Abajo)"     → matches "back squat"
//   ❌ "Peso Muerto Rumano"               → does NOT match "peso muerto" (Rumano is a new word)
//   ❌ "Peso Muerto Sumo"                 → does NOT match "peso muerto"
function matchTracked(exName, trackedList){
  if(!exName) return null;
  const lower = exName.toLowerCase().trim();
  // Sort by specificity (longer terms first) to prefer more specific matches
  const sorted = [...trackedList].sort((a,b)=>{
    const aMax = Math.max(...a.matchTerms.map(t=>t.length));
    const bMax = Math.max(...b.matchTerms.map(t=>t.length));
    return bMax - aMax;
  });
  for(const t of sorted){
    for(const term of t.matchTerms){
      const tl = term.toLowerCase().trim();
      const idx = lower.indexOf(tl);
      if(idx === -1) continue;
      const after = lower.slice(idx + tl.length);
      // What comes after the matched term?
      // ALLOW: empty, spaces, (, ", ', -, c/ (abbreviation with slash)
      // BLOCK: a regular word starting with a letter that isn't preceded by /
      const afterTrimmed = after.trimStart();
      if(afterTrimmed.length === 0) return t; // exact match
      // Allow if next char is (, ", space, or c/ pattern
      if(/^[\(\"\'\-\s]/.test(afterTrimmed)) return t;
      // Allow "c/" abbreviation pattern (e.g. "c/barra", "c/pausa")
      if(/^c\//.test(afterTrimmed)) return t;
      // Block if next char is a regular letter (different word like "rumano", "sumo")
      if(/^[a-záéíóúüñ]/i.test(afterTrimmed)) continue;
      return t;
    }
  }
  return null;
}

const DEFAULT_RPE_INFO = {

    'Técnica bajo presión, requiere foco máximo.',
    'Semana pico: dejá todo adentro pero sin sacrificar la forma.'
  ]},
  '@1':  { title:'@1 / @2 — Trabajo accesorio', items:[

    'Enfocate en la ejecución limpia y el bombeo muscular.',
    'Estos ejercicios complementan el trabajo principal.',
    'No compitas con el peso, priorizá la conexión mente-músculo.'
  ]},
  '@2':  { title:'@1 / @2 — Trabajo accesorio', items:[
    'Esfuerzo bajo, sensación de que podés hacer muchas más.',
    'Enfocate en la ejecución limpia y el bombeo muscular.',
    'Estos ejercicios complementan el trabajo principal.',
    'No compitas con el peso, priorizá la conexión mente-músculo.'
  ]}
};

// ============================================================
// HASH
// ============================================================
function hashStr(s){ let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h)+s.charCodeAt(i)&0xffffffff; return String(h>>>0); }

// ============================================================
// STORAGE HELPERS
// ============================================================
async function sharedGet(key){
  // Wait briefly for Firebase module to load if not ready yet
  let tries=0; while(!window.__fsCloudReady && tries<50){ await new Promise(r=>setTimeout(r,100)); tries++; }
  if(window.__fsCloudReady){
    const v=await window.__fsCloudGet(key);
    if(v!==null) return JSON.parse(v);
  }
  return null;
}
async function sharedSet(key,val){
  let tries=0; while(!window.__fsCloudReady && tries<50){ await new Promise(r=>setTimeout(r,100)); tries++; }
  if(window.__fsCloudReady) await window.__fsCloudSet(key,JSON.stringify(val));
}

async function personalGet(key){
  let tries=0; while(!window.__fsCloudReady && tries<50){ await new Promise(r=>setTimeout(r,100)); tries++; }
  if(window.__fsCloudReady){
    const v=await window.__fsCloudGet(key);
    if(v!==null) return JSON.parse(v);
  }
  return null;
}
async function personalSet(key,val){
  let tries=0; while(!window.__fsCloudReady && tries<50){ await new Promise(r=>setTimeout(r,100)); tries++; }
  if(window.__fsCloudReady) await window.__fsCloudSet(key,JSON.stringify(val));
}

function lsGet(key){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):null; }catch(e){return null;} }
function lsSet(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch(e){} }

// ============================================================
// USER MANAGEMENT
// ============================================================
let users = {};    // {id: {id,name,email,hash,status}}
let plan  = null;
let rpeInfo = null;
let prs = {};      // {exName: {rm1:{weight,week,newPr}, rm2:..., rm3:..., rm4:...}}
let tracked = null; // [{name, matchTerms:[]}]

async function loadUsers(){ const u=await sharedGet(K.USERS); if(u) users=u; }
async function saveUsers(){ await sharedSet(K.USERS,users); }

function getUserByEmail(email){ return Object.values(users).find(u=>u.email===email.toLowerCase().trim())||null; }
function getUserById(id){ return users[id]||null; }

async function registerUser(name,email,password){
  email=email.toLowerCase().trim();
  if(getUserByEmail(email)) return {ok:false,err:'Ya existe una cuenta con ese email.'};
  const id = 'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  users[id]={ id, name:name.trim(), email, hash:hashStr(password), status:STATUS.PENDING };
  await saveUsers();
  return {ok:true};
}

async function loginUser(email,password){
  await loadUsers();
  email=email.toLowerCase().trim();
  const u=getUserByEmail(email);
  if(!u) return {ok:false,err:'Email o contraseña incorrectos.'};
  if(u.hash!==hashStr(password)) return {ok:false,err:'Email o contraseña incorrectos.'};
  if(u.status===STATUS.PENDING) return {ok:false,err:'PENDING'};
  if(u.status===STATUS.BLOCKED) return {ok:false,err:'Tu cuenta fue deshabilitada. Contactá al profe.'};
  return {ok:true,user:u};
}

// ============================================================
// SESSION
// ============================================================
let session = null;  // {uid,email,name}
function loadSession(){ session=lsGet(K.SESSION); }
function saveSession(u){ session={uid:u.id,email:u.email,name:u.name}; lsSet(K.SESSION,session); }
function clearSession(){ session=null; localStorage.removeItem(K.SESSION); }

// ============================================================
// PLAN
// ============================================================
async function loadPlan(){
  const remote=await sharedGet(K.PLAN);
  if(remote){ plan=remote; lsSet(K.PLAN,remote); }
  else{ plan=lsGet(K.PLAN); }
  if(!plan) plan=buildDefaultRoutine();
}
async function savePlan(){ await sharedSet(K.PLAN,plan); lsSet(K.PLAN,plan); }

async function loadRpeInfo(){
  const remote=await sharedGet(K.RPE_INFO);
  if(remote){ rpeInfo=remote; lsSet(K.RPE_INFO,remote); }
  else{ rpeInfo=lsGet(K.RPE_INFO); }
  if(!rpeInfo) rpeInfo=JSON.parse(JSON.stringify(DEFAULT_RPE_INFO));
}
async function saveRpeInfo(){ await sharedSet(K.RPE_INFO,rpeInfo); lsSet(K.RPE_INFO,rpeInfo); }

async function loadTracked(){
  const remote = await sharedGet(K.TRACKED);
  if(remote){ tracked=remote; lsSet(K.TRACKED,remote); }
  else { tracked=lsGet(K.TRACKED); }
  if(!tracked) tracked=JSON.parse(JSON.stringify(DEFAULT_TRACKED));
}
async function saveTracked(){ await sharedSet(K.TRACKED,tracked); lsSet(K.TRACKED,tracked); }

async function loadPrs(){
  if(!session||session.uid==='__pending__') return;
  const remote=await personalGet(K.PRS(session.uid));
  if(remote){ prs=remote; lsSet(K.PRS(session.uid),remote); }
  else { prs=lsGet(K.PRS(session.uid))||{}; }
}
async function savePrs(){
  if(!session||session.uid==='__pending__') return;
  await personalSet(K.PRS(session.uid),prs);
  lsSet(K.PRS(session.uid),prs);
}

// Build a lookup map: progressKey → {exName, repsStr, weekNum}
// This is derived from the CURRENT plan in Firebase
function buildProgressKeyMap(){
  const map = {};
  if(!plan) return map;
  plan.forEach(wd=>{
    wd.days.forEach(day=>{
      day.blocks.forEach(block=>{
        block.exercises.forEach(ex=>{
          if(ex.type==='single'){
            ex.sets.forEach((s,si)=>{
              map[`${ex.id}_s${si}`]={ exName:ex.name, repsStr:s.r, weekNum:wd.week };
            });
          } else {
            for(let si=0;si<ex.count;si++){
              ex.parts.forEach(p=>{
                map[`${ex.id}_${p.pid}_s${si}`]={ exName:p.name, repsStr:p.r, weekNum:wd.week };
              });
            }
          }
        });
      });
    });
  });
  return map;
}

// Recalculate ALL PRs by scanning every key in progress and matching to plan
function recalcPrsFromProgress(){
  if(!plan||!progress) return;
  const trList = tracked||DEFAULT_TRACKED;
  const newPrs = {};
  const keyMap = buildProgressKeyMap();

  // Scan ALL progress keys — this works even if the plan changed
  Object.entries(progress).forEach(([k, d])=>{
    if(!d||!d.weight) return;
    const w = parseFloat(d.weight);
    if(!w||isNaN(w)||w<=0) return;

    // Find this key in the current plan map
    const meta = keyMap[k];
    if(!meta) return; // key exists in progress but not in current plan — skip

    const matched = matchTracked(meta.exName, trList);
    if(!matched) return;

    const reps = parseReps(meta.repsStr);
    const rk = getPrRangeKey(reps);
    if(!rk) return;

    const tn = matched.name;
    if(!newPrs[tn]) newPrs[tn]={};
    if(!newPrs[tn][rk]||w>newPrs[tn][rk].weight){
      const wasNew = prs[tn]&&prs[tn][rk]&&prs[tn][rk].newPr&&prs[tn][rk].weight===w;
      newPrs[tn][rk]={ weight:w, week:meta.weekNum, newPr:!!wasNew };
    }
  });

  prs = newPrs;
  savePrs();
}

// Debug: log what progress keys exist and whether they match the current plan
// Call window.__debugPrs() from browser console to diagnose
window.__debugPrs = function(){
  const keyMap = buildProgressKeyMap();
  const progKeys = Object.keys(progress).filter(k=>progress[k]&&progress[k].weight);
  console.log('=== PR DEBUG ===');
  console.log('Progress keys with weight:', progKeys.length);
  console.log('Plan keys:', Object.keys(keyMap).length);
  progKeys.forEach(k=>{
    const meta=keyMap[k];
    const d=progress[k];
    const match=meta?matchTracked(meta.exName,tracked||DEFAULT_TRACKED):null;
    console.log(k,'→ weight:',d.weight,'| plan meta:',meta?meta.exName:'NOT IN PLAN','| tracked:',match?match.name:'NO MATCH');
  });
};

// ============================================================
// PROGRESS (per-user)
// ============================================================
let progress = {};
async function loadProgress(){
  if(!session) return;
  const remote=await personalGet(K.PROG(session.uid));
  if(remote){ progress=remote; lsSet(K.PROG(session.uid),remote); }
  else{ progress=lsGet(K.PROG(session.uid))||{}; }
  // Always recalculate PRs from the freshly loaded progress data
  // This ensures cross-device sync: if you deleted a weight on another device,
  // the PR recalculates correctly here too
  recalcPrsFromProgress();
}
async function saveProgress(){
  if(!session) return;
  // When impersonating, save to the impersonated user's storage, not admin's
  const targetUid = adminState.impersonating ? adminState.impersonating.uid : session.uid;
  await personalSet(K.PROG(targetUid), progress);
  lsSet(K.PROG(targetUid), progress);
}

function getSetData(k){ return progress[k]||{weight:'',notes:'',done:false}; }
function setSetData(k,f,v){
  if(!progress[k])progress[k]={weight:'',notes:'',done:false};
  progress[k][f]=v;
  saveProgress();
  // Recalculate ALL PRs from scratch whenever weight changes (handles edits and deletions correctly)
  if(f==='weight') recalcPrsFromProgress();
}

// ============================================================
// DEFAULT ROUTINE BUILDER
// ============================================================
function buildDefaultWeek(w){
  const secSets=(w>=4&&w<=7)?4:3;
  const rpeSec=(w>=5&&w<=7)?'@1':'@2';
  const domSets=(w===1||w===2||(w>=4&&w<=7))?4:3;
  const d3Sets=(w===8||w===9)?3:4;
  const d3Reps=(w>=4&&w<=7)?'8':'10';
  const d3Acc=(w>=4&&w<=7)?4:3;

  function ss(dl=false){
    if(w===1) return dl?Array(3).fill({r:'6',rpe:'@6'}):Array(4).fill({r:'6',rpe:'@6'});
    if(w===2) return dl?Array(3).fill({r:'6',rpe:'@6'}):Array(4).fill({r:'6',rpe:'@6'});
    if(w===3) return Array(3).fill({r:'6',rpe:'@7'});
    if(w===4) return [...Array(3).fill({r:'6',rpe:'@7'}),{r:'1',rpe:'@7.5'}];
    if(w===5) return [...Array(3).fill({r:'4',rpe:'@7'}),{r:'1',rpe:'@8'}];
    if(w===6) return [{r:'1',rpe:'@8'},...Array(3).fill({r:'4',rpe:'@7'})];
    if(w===7) return [{r:'1',rpe:'@8.5/@9'},...Array(3).fill({r:'3',rpe:'@7'})];
    return Array(3).fill({r:'6',rpe:'@6'});
  }

  const nm=(function(){
    if(w===1) return {b:'BANCO PLANO C/BARRA (PAUSA 2")',pm:'PESO MUERTO C/PAUSA 2" (DEBAJO RODILLA)',sq:'BACK SQUAT (PAUSA 2" ABAJO)'};
    if(w===2) return {b:'BANCO PLANO C/BARRA (TEMPO 3"+PAUSA 2")',pm:'PESO MUERTO C/TEMPO 3" EN SUBIDA',sq:'BACK SQUAT CON TARGET (PAUSA 2" ABAJO)'};
    return {b:'BANCO PLANO C/BARRA (PAUSA 1")',pm:'PESO MUERTO',sq:'BACK SQUAT'};
  })();

  const uid=w+'_'+Date.now();
  const eid=(d,b,n)=>`w${w}d${d}b${b}e${n}`;

  return {week:w,days:[
    {id:'d1',name:'DÍA 1',days:'LUNES / MARTES',icon:'🏋️',blocks:[

// ============================================================
// PROGRESS CALC
// ============================================================
function blockAnyDone(block,prog){
  const p=prog||progress;
  for(const ex of block.exercises){
    if(ex.type==='single'){ for(let i=0;i<ex.sets.length;i++){ if((p[`${ex.id}_s${i}`]||{}).done) return true; } }
    else{ for(let i=0;i<ex.count;i++) for(const pt of ex.parts){ if((p[`${ex.id}_${pt.pid}_s${i}`]||{}).done) return true; } }
  }
  return false;
}
function calcWeekPct(wd,prog){
  let pct=0;
  [0,1].forEach(di=>{ const d=wd.days[di]; if(d&&d.blocks.some(b=>blockAnyDone(b,prog))) pct+=50; });
  return pct;
}

async function doLogin(){
  authState.loading=true; authState.err=''; render();
  await loadUsers();
  const res=await loginUser(authState.email,authState.pw);
  authState.loading=false;
  if(!res.ok){
    if(res.err==='PENDING'){ authState.err=''; session={uid:'__pending__',name:'',email:authState.email}; render(); return; }
    authState.err=res.err; render(); return;
  }
  saveSession(res.user);
  await loadProgress();
  render();
}

async function doRegister(){
  if(!authState.name.trim()){ authState.err='Ingresá tu nombre.'; render(); return; }
  if(!authState.email.includes('@')){ authState.err='Email inválido.'; render(); return; }
  if(authState.pw.length<6){ authState.err='La contraseña debe tener al menos 6 caracteres.'; render(); return; }
  if(authState.pw!==authState.pw2){ authState.err='Las contraseñas no coinciden.'; render(); return; }
  authState.loading=true; authState.err=''; render();
  await loadUsers();
  const res=await registerUser(authState.name,authState.email,authState.pw);
  authState.loading=false;
  if(!res.ok){ authState.err=res.err; render(); return; }
  authState.err=''; authState.mode='login';
  showToast('✅ ¡Cuenta creada! Esperá la aprobación del profe.');
  render();
}

function doLogout(){ clearSession(); progress={}; userMenuOpen=false; authState={mode:'login',name:'',email:'',pw:'',pw2:'',err:'',loading:false}; render(); }

function getWeekMainRpe(wd){
  // Find the RPE used in the first main exercise of Day 1 (bench/squat/deadlift = first exercise of each day)
  try{
    const firstEx=wd.days[0].blocks[0].exercises[0];

function renderWorkout(){
  const wd=plan[ST.week]; const day=wd.days[ST.dayIdx]; const block=day.blocks[ST.blockIdx];
  // Build PR metadata map: setKey → {exName, reps, week}
  window.__prMeta={};
  block.exercises.forEach(ex=>{
    if(ex.type==='single'){
      ex.sets.forEach((s,si)=>{
        window.__prMeta[`${ex.id}_s${si}`]={exName:ex.name, reps:s.r, week:wd.week};
      });
    } else {
      for(let si=0;si<ex.count;si++){
        ex.parts.forEach(p=>{
          window.__prMeta[`${ex.id}_${p.pid}_s${si}`]={exName:p.name, reps:p.r, week:wd.week};
        });
      }
    }
  });
  const exsH=block.exercises.map(ex=>renderExercise(ex)).join('');
  return `<div class="workout-header">
      <button class="nav-back" onclick="nav('day',{week:${ST.week},dayIdx:${ST.dayIdx}})">${IC.back}</button>
      <div class="workout-info"><div class="workout-week">SEM. ${wd.week} · ${day.name} · ${day.days}</div><div class="workout-block">${block.name}</div></div>
      <div style="width:36px"></div>
    </div>
    <div class="workout-content">${exsH}
      <button class="finish-btn" onclick="handleFinish()">${IC.trophy} FINALIZAR BLOQUE</button>
    </div>`;
}

function renderExercise(ex){
  if(ex.type==='single'){
    const sH=ex.sets.map((s,si)=>renderSingleSet(ex.id,si,s)).join('');
    return `<div class="ex-card"><div class="ex-header"><span class="ex-order">${ex.order}</span><div><div class="ex-name">${ex.name}</div></div></div><div class="sets-wrap">${sH}</div></div>`;
  }
  let sH='';
  for(let si=0;si<ex.count;si++){
    const pH=ex.parts.map(p=>renderSSPart(ex.id,p,si)).join('');
    sH+=`<div class="superset-set-block"><div class="superset-set-header">SERIE ${si+1}</div>${pH}</div>`;
  }
  return `<div class="ex-card"><div class="ex-header"><span class="ex-order">${ex.order}</span><div><span class="combined-tag">BLOQUE COMBINADO</span><div class="ex-name">${ex.parts.map(p=>p.name).join(' + ')}</div></div></div><div class="sets-wrap">${sH}</div></div>`;
}

function getPrBadge(exName, repsStr, weight){
  if(!weight||!exName) return '';
  const w=parseFloat(weight); if(!w||isNaN(w)) return '';
  const matched=matchTracked(exName, tracked||DEFAULT_TRACKED);
  if(!matched) return '';
  const reps=parseReps(repsStr);
  const rk=getPrRangeKey(reps);
  if(!rk) return '';
  const ex=prs[matched.name];
  if(!ex||!ex[rk]) return '';
  const range=PR_RANGES.find(r=>r.key===rk);
  if(ex[rk].weight===w && ex[rk].newPr)
    return `<span style="font-size:10px;font-weight:800;color:var(--gold);letter-spacing:.5px;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);border-radius:4px;padding:2px 6px;flex-shrink:0">🏆 PR ${range.label}</span>`;
  if(ex[rk].weight===w)
    return `<span style="font-size:10px;font-weight:700;color:var(--orange);background:var(--orange-dim);border-radius:4px;padding:2px 6px;flex-shrink:0">= ${range.label}</span>`;
  return '';
}

function renderSingleSet(exId,si,s){
  const k=`${exId}_s${si}`; const d=getSetData(k);
  const meta=window.__prMeta&&window.__prMeta[k];
  const badge=meta&&d.weight?getPrBadge(meta.exName,meta.reps,d.weight):'';
  return `<div class="set-row ${d.done?'done':''}" id="sr_${k}">
    <div class="set-row-top"><span class="set-label">SERIE ${si+1}</span>
      <div style="display:flex;align-items:center;gap:6px">
        ${badge}
        <span class="set-target">${s.r} <span class="set-target-rpe">${s.rpe!=='-'?s.rpe:''}</span></span>
      </div>
    </div>
    <div class="set-inputs">
      <input class="inp-kg" type="number" inputmode="decimal" placeholder="Kg" value="${escH(d.weight)}" oninput="setSetData('${k}','weight',this.value)">
      <input class="inp-notes" type="text" placeholder="Sensaciones, RPE real..." value="${escH(d.notes)}" oninput="setSetData('${k}','notes',this.value)">
      <button class="btn-check ${d.done?'checked':''}" onclick="toggleDone('${k}')">${IC.check(d.done)}</button>
    </div>
  </div>`;
}

function renderSSPart(exId,part,si){
  const k=`${exId}_${part.pid}_s${si}`; const d=getSetData(k);
  const meta=window.__prMeta&&window.__prMeta[k];
  const badge=meta&&d.weight?getPrBadge(meta.exName,meta.reps,d.weight):'';
  return `<div class="superset-part ${d.done?'part-done':''}" id="sr_${k}">
    <div class="superset-part-name">
      <span>${part.name}</span>
      <div style="display:flex;align-items:center;gap:5px">
        ${badge}
        <span class="set-target" style="font-size:11px">${part.r} <span class="set-target-rpe">${part.rpe!=='-'?part.rpe:''}</span></span>
      </div>
    </div>
    <div class="set-inputs">
      <input class="inp-kg" type="number" inputmode="decimal" placeholder="Kg" value="${escH(d.weight)}" oninput="setSetData('${k}','weight',this.value)">
      <input class="inp-notes" type="text" placeholder="Sensaciones..." value="${escH(d.notes)}" oninput="setSetData('${k}','notes',this.value)">
      <button class="btn-check ${d.done?'checked':''}" onclick="toggleDone('${k}')">${IC.check(d.done)}</button>
    </div>
  </div>`;
}

function toggleDone(k){
  const d=getSetData(k); const on=!d.done; setSetData(k,'done',on);
  const row=document.getElementById('sr_'+k);
  if(row){ row.classList.toggle('done',on); row.classList.toggle('part-done',on);
    const btn=row.querySelector('.btn-check'); if(btn){btn.className='btn-check'+(on?' checked':'');btn.innerHTML=IC.check(on);} }
}

function openAdmin(){ adminState.open=true; renderModal(); }
function closeAdmin(){ adminState.open=false; document.getElementById('modal-root').innerHTML=''; }

function renderModal(){
  if(!adminState.open) return;
  const root=document.getElementById('modal-root');
  const existingModal=root.querySelector('.modal');

  if(existingModal){
    // Save scroll BEFORE touching the DOM
    const savedScroll = existingModal.scrollTop;
    const goingIntoDetail = adminState.viewUserIdx !== null;

    // Update only the body content — never touch .modal itself
    const body=existingModal.querySelector('.modal-body');
    if(body) body.innerHTML=adminState.pwOk?renderAdminBody():renderAdminPw();

    // After DOM update: scroll to top for detail views, restore position when returning
    requestAnimationFrame(()=>{
      existingModal.scrollTop = goingIntoDetail ? 0 : savedScroll;
    });
  } else {
    // First render — build full modal structure
    root.innerHTML=`<div class="modal-overlay" onclick="closeAdminBg(event)">
      <div class="modal">
        <div class="modal-header"><span class="modal-title">${IC.lock} ADMIN</span><button class="modal-close" onclick="closeAdmin()">✕</button></div>
        <div class="modal-body">${adminState.pwOk?renderAdminBody():renderAdminPw()}</div>
      </div>
    </div>`;
  }
}

function closeAdminBg(e){ if(e.target.classList.contains('modal-overlay')) closeAdmin(); }

function renderAdminPw(){
  return `<div class="pw-wrap">
    <h3>Acceso restringido</h3>
    <p>Ingresá la contraseña de administrador.</p>
    <input class="adm-inp" type="password" id="adm-pw-inp" placeholder="Contraseña..." onkeydown="if(event.key==='Enter')checkAdminPw()">
    ${adminState.pwErr?`<span class="pw-err">❌ ${adminState.pwErr}</span>`:''}
    <button class="adm-btn adm-btn-orange" onclick="checkAdminPw()" style="width:100%;justify-content:center;padding:12px">INGRESAR</button>
  </div>`;
}

async function checkAdminPw(){
  const val=document.getElementById('adm-pw-inp').value;
  const remote=await sharedGet(K.ADMINPW);
  const stored=remote || lsGet(K.ADMINPW) || hashStr(DEFAULT_ADMIN_PW);
  if(remote) lsSet(K.ADMINPW,remote); // keep local cache in sync
  if(hashStr(val)===stored){
    adminState.pwOk=true; adminState.pwErr='';
    await loadUsers(); // always show freshest user list when entering admin
    renderModal();
  }
  else{ adminState.pwErr='Contraseña incorrecta.'; renderModal(); }
}

// ---- TAB: USUARIOS ----
function renderTabUsers(){
  if(adminState.viewUserIdx) return renderUserProgress();

  const all=Object.values(users);
  const pending=all.filter(u=>u.status===STATUS.PENDING);
  const active=all.filter(u=>u.status===STATUS.ACTIVE||u.status===STATUS.BLOCKED);

  const subTabs=`<div style="display:flex;gap:8px;margin-bottom:12px">
    <div class="admin-tab ${adminState.userSubTab==='active'?'active':''}" onclick="setUserSubTab('active')">

    </div>
    <div class="admin-tab ${adminState.userSubTab==='pending'?'active':''}" onclick="setUserSubTab('pending')" style="${pending.length?'border-color:var(--yellow);color:var(--yellow)':''}">
      ⏳ Solicitudes ${pending.length?`<span style="background:rgba(245,158,11,0.25);border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;color:var(--yellow)">${pending.length}</span>`:''}
    </div>
  </div>`;

  if(adminState.userSubTab==='pending'){
    if(!pending.length) return subTabs+`<div style="text-align:center;padding:32px 0;color:var(--text3)"><div style="font-size:36px;margin-bottom:12px">🎉</div>No hay solicitudes pendientes</div>`;
    const rows=pending.map(u=>renderUserRow(u)).join('');
    return subTabs+`<div class="admin-section-title">SOLICITUDES PENDIENTES (${pending.length})</div>${rows}`;
  }

  // Activity filter
  const actFilter=`<div style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto">
    <div class="admin-tab ${adminState.userActivityFilter==='all'?'active':''}" style="font-size:11px;padding:4px 10px;flex-shrink:0" onclick="setUserActivityFilter('all')">Todos</div>
    <div class="admin-tab ${adminState.userActivityFilter==='recording'?'active':''}" style="font-size:11px;padding:4px 10px;flex-shrink:0" onclick="setUserActivityFilter('recording')">📝 Anotando</div>
    <div class="admin-tab ${adminState.userActivityFilter==='silent'?'active':''}" style="font-size:11px;padding:4px 10px;flex-shrink:0;${adminState.userActivityFilter==='silent'?'':'border-color:rgba(239,68,68,0.4);color:var(--red)'}" onclick="setUserActivityFilter('silent')">😴 Sin registros</div>
  </div>`;

  // Search — oninput calls filterUsers() to update only the list without re-rendering modal
  const searchBar=`<div style="position:relative;margin-bottom:12px">
    <input class="adm-inp" id="user-search-inp" style="margin:0;padding-left:36px" placeholder="Buscar por nombre..."
      value="${escH(adminState.userSearch)}" oninput="filterUsers(this.value)">
    <div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
  </div>`;

  const listHTML=buildUserListHTML(active, adminState.userSearch, adminState.userActivityFilter);
  return subTabs+actFilter+searchBar+`<div id="user-list-wrap">${listHTML}</div>`;
}

function buildUserListHTML(active, q, actFilter){
  const qn=(q||'').toLowerCase().trim();
  const filtered=active.filter(u=>{
    if(qn && !u.name.toLowerCase().includes(qn)) return false;
    if(actFilter==='recording') return userActivityMap[u.id]===true;
    if(actFilter==='silent') return userActivityMap[u.id]===false;
    return true;
  });
  if(!filtered.length) return `<p style="color:var(--text3);font-size:13px;text-align:center;padding:20px">Sin resultados</p>`;
  return `<div class="admin-section-title">ALUMNOS (${filtered.length})</div>`+filtered.map(u=>renderUserRow(u)).join('');
}

// Update only the list div — no modal re-render, preserves input focus
function filterUsers(val){
  adminState.userSearch=val;
  const wrap=document.getElementById('user-list-wrap');
  if(!wrap) return;
  const active=Object.values(users).filter(u=>u.status===STATUS.ACTIVE||u.status===STATUS.BLOCKED);
  wrap.innerHTML=buildUserListHTML(active, val, adminState.userActivityFilter);
}

function setUserActivityFilter(f){ adminState.userActivityFilter=f; renderModal(); }

function renderUserRow(u){
  const ini=u.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const isPending=u.status===STATUS.PENDING;
  const isBlocked=u.status===STATUS.BLOCKED;
  const hasRec=userActivityMap[u.id];
  const recBadge=(!isPending&&hasRec===false)?`<span style="font-size:9px;font-weight:700;color:var(--red);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:4px;padding:1px 6px;margin-top:3px;display:inline-block">SIN REGISTROS</span>`
    :(!isPending&&hasRec===true)?`<span style="font-size:9px;font-weight:700;color:var(--green);background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:4px;padding:1px 6px;margin-top:3px;display:inline-block">📝 ANOTANDO</span>`:'';
  return `<div class="user-row">
    <div class="user-row-avatar">${ini}</div>
    <div class="user-row-info">
      <div class="user-row-name">${escH(u.name)}</div>
      <div class="user-row-email">${escH(u.email)}</div>
      ${isBlocked?`<div style="margin-top:3px"><span class="badge badge-blocked">BLOQUEADO</span></div>`:recBadge?`<div>${recBadge}</div>`:''}
    </div>
    <div class="user-row-actions">
      ${isPending?`<button class="adm-btn adm-btn-green" style="padding:6px 12px;font-weight:700" onclick="approveUser('${u.id}')">✓ Aprobar</button>`:''}
      ${!isPending&&!isBlocked?`<button class="adm-btn adm-btn-red" style="padding:6px 8px" onclick="blockUser('${u.id}')" title="Bloquear">✕</button>`:''}
      ${isBlocked?`<button class="adm-btn adm-btn-blue" style="padding:6px 8px" onclick="unblockUser('${u.id}')" title="Reactivar">↩</button>`:''}
      ${!isPending?`<button class="adm-btn adm-btn-blue" style="padding:6px 8px" onclick="impersonateUser('${u.id}')" title="Entrar como alumno">👤</button>`:''}
      ${!isPending?`<button class="adm-btn adm-btn-ghost" style="padding:6px 8px" onclick="viewUserProgress('${u.id}')" title="Ver progreso">${IC.eye}</button>`:''}

let viewProgData=null;

// Check if a user has ever recorded any weight entry
async function hasUserEverRecorded(uid){
  const prog = await personalGet(K.PROG(uid)) || lsGet(K.PROG(uid)) || {};
  return Object.values(prog).some(d => d && (d.weight || d.done));
}
async function viewUserProgress(id){
  // Save current scroll position so we can restore it when going back
  const modal=document.querySelector('#modal-root .modal');
  adminState.savedScroll=modal?modal.scrollTop:0;
  adminState.viewUserIdx=id;
  adminState.viewUserWeek=0;
  viewProgData=await personalGet(K.PROG(id))||{};
  renderModal();
}

function renderUserProgress(){
  const u=getUserById(adminState.viewUserIdx);
  if(!u) return '';

  const weekTabs=plan.map((_,i)=>`
    <div class="prog-week-tab ${adminState.viewUserWeek===i?'active':''}" onclick="setProgWeek(${i})">S${i+1}</div>
  `).join('');

  const wd=plan[adminState.viewUserWeek];

  // Helper: does a progress entry have any real data worth showing?
  function hasData(d){ return d && (d.done===true || (d.weight&&d.weight.toString().trim()!=='') || (d.notes&&d.notes.trim()!=='')); }

  let entries='';

  wd.days.forEach(day=>{
    day.blocks.forEach(block=>{
      block.exercises.forEach(ex=>{

        if(ex.type==='single'){
          // Collect only sets that have real data
          let setRows='';
          ex.sets.forEach((s,si)=>{
            const k=`${ex.id}_s${si}`; const d=viewProgData[k];
            if(!hasData(d)) return;
            setRows+=`<div class="prog-entry-row" style="margin-bottom:4px">
              <span class="set-label" style="width:64px;flex-shrink:0">SERIE ${si+1}</span>
              <span class="prog-entry-val">${d.weight?d.weight+' kg':'— kg'}</span>
              ${d.done?`<span class="prog-entry-done">✓</span>`:`<span style="color:var(--text3);font-size:11px">sin check</span>`}
            </div>
            ${d.notes?`<div class="prog-entry-notes" style="margin-bottom:2px">"${escH(d.notes)}"</div>`:''}`;
          });
          if(!setRows) return; // skip exercise entirely if no data
          entries+=`<div class="prog-entry">
            <div class="prog-entry-header">${day.name} · ${block.name}</div>
            <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">${ex.name}</div>
            ${setRows}
          </div>`;

        } else {
          // Superset — group by serie number, one card per exercise within the set
          // Only show series where at least one part has real data
          let anyData=false;
          let serieBlocks='';

          for(let si=0;si<ex.count;si++){
            // Check if any part of this serie has data
            const partsWithData=ex.parts.filter(p=>hasData(viewProgData[`${ex.id}_${p.pid}_s${si}`]));
            if(!partsWithData.length) continue;
            anyData=true;

            let partRows='';
            ex.parts.forEach(p=>{
              const k=`${ex.id}_${p.pid}_s${si}`; const d=viewProgData[k];
              const hasd=hasData(d);
              partRows+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;padding:4px 0;border-bottom:1px solid var(--border)">
                <span style="font-size:11px;color:var(--text2);flex:1;line-height:1.3">${p.name}</span>
                <span class="prog-entry-val" style="font-size:12px">${hasd&&d.weight?d.weight+' kg':'—'}</span>
                ${hasd&&d.done?`<span class="prog-entry-done">✓</span>`:`<span style="color:var(--text3);font-size:10px;width:16px"></span>`}
              </div>
              ${hasd&&d.notes?`<div class="prog-entry-notes" style="margin-bottom:4px">"${escH(d.notes)}"</div>`:''}`;
            });

            serieBlocks+=`<div style="margin-bottom:10px">
              <div class="set-label" style="margin-bottom:6px">SERIE ${si+1}</div>
              ${partRows}
            </div>`;
          }

          if(!anyData) return; // skip entire exercise if no data in any serie
          entries+=`<div class="prog-entry">
            <div class="prog-entry-header">${day.name} · ${block.name}</div>

function addWeek(){ plan.push(buildDefaultWeek(plan.length+1)); renderModal(); }

function duplicateWeek(i){
  const source = plan[i];
  const newWeekNum = plan.length + 1;
  const clone = JSON.parse(JSON.stringify(source)); // deep copy
  clone.week = newWeekNum;

  // Regenerate every exercise id so progress isn't shared with the source week
  const stamp = Date.now();
  clone.days.forEach((day, di) => {
    day.blocks.forEach((block, bi) => {
      block.exercises.forEach((ex, ei) => {
        ex.id = `w${newWeekNum}d${di}b${bi}x${stamp}${ei}`;
      });
    });
  });

  plan.push(clone);
  renderModal();
  showToast(`✅ Semana ${source.week} duplicada como Semana ${newWeekNum}`);
}

function removeWeek(i){
  if(plan.length<=1){showToast('Debe haber al menos 1 semana');return;}
  if(!confirm('¿Eliminar semana '+plan[i].week+'?'))return;
  plan.splice(i,1);
  plan.forEach((wd,idx)=>{ wd.week = idx+1; }); // keep week numbers sequential
  renderModal();
}
function addDay(wi){ const n=plan[wi].days.length+1; plan[wi].days.push({id:'d'+n,name:'DÍA '+n,days:'NUEVO DÍA',icon:'📌',blocks:[{id:'u',name:'TREN SUPERIOR',icon:'💪',exercises:[]},{id:'l',name:'TREN INFERIOR',icon:'🦵',exercises:[]}]}); renderModal(); }
function removeDay(wi,di){ if(plan[wi].days.length<=1){showToast('Debe haber al menos 1 día');return;} plan[wi].days.splice(di,1); renderModal(); }
function updateDayName(wi,di,v){ plan[wi].days[di].name=v; }
function updateDayDays(wi,di,v){ plan[wi].days[di].days=v; }

function addTracked(){

    </div>

    ${unmatched.length>0?`
    <div class="admin-section-title">SOLUCIÓN</div>
    <div class="ex-edit-card" style="margin-bottom:10px">
      <p style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px">
        Hay <strong style="color:var(--red)">${unmatched.length} registros</strong> que no coinciden con el plan actual. Esto pasa cuando el plan fue regenerado y los IDs cambiaron. El progreso sigue guardado en Firebase — el problema es solo que los IDs no matchean.
      </p>
      <p style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px">
        Para solucionarlo sin perder datos, necesitás <strong style="color:var(--orange)">resetear el plan desde cero</strong> usando el mismo código de generación. Eso va a regenerar los IDs correctamente y el progreso existente va a quedar vinculado.
      </p>
      <button class="adm-btn adm-btn-orange" onclick="resetPlanToDefault()" style="width:100%;justify-content:center;padding:12px">

    </div>
    `:''}

    <div class="admin-section-title">VERIFICAR ALUMNO</div>
    <div class="ex-edit-card">
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Seleccioná un alumno para ver el estado de sus registros:</p>

      <div id="diag-user-result" style="margin-top:12px"></div>
    </div>
  </div>`;
}

async function runUserDiag(){
  const sel=document.getElementById('diag-user-sel');
  const res=document.getElementById('diag-user-result');
  if(!sel||!sel.value){res.innerHTML='<p style="color:var(--text3);font-size:12px">Seleccioná un alumno primero</p>';return;}
  res.innerHTML='<p style="color:var(--text3);font-size:12px">Cargando...</p>';
  const uid=sel.value;
  const userProg=await personalGet(K.PROG(uid))||{};
  const keyMap=buildProgressKeyMap();
  const withW=Object.keys(userProg).filter(k=>userProg[k]&&userProg[k].weight);
  const matched=withW.filter(k=>keyMap[k]);
  const unmatched=withW.filter(k=>!keyMap[k]);
  const u=getUserById(uid);
  res.innerHTML=`<div style="font-size:12px;line-height:1.8;color:var(--text2)">
    <strong style="color:var(--text)">${escH(u?.name||uid)}</strong><br>
    Registros con peso: <strong style="color:var(--text)">${withW.length}</strong><br>
    Coinciden con plan: <strong style="color:${matched.length>0?'var(--green)':'var(--red)'}">${matched.length}</strong><br>
    No coinciden: <strong style="color:${unmatched.length>0?'var(--red)':'var(--green)'}">${unmatched.length}</strong><br>
    ${unmatched.length>0?`<span style="color:var(--red)">⚠️ IDs desactualizados — los PRs y gráficos no funcionarán hasta regenerar el plan</span>`:`<span style="color:var(--green)">✅ Todo coincide correctamente</span>`}
  </div>`;
}

async function resetPlanToDefault(){
  if(!confirm('¿Regenerar el plan con IDs correctos? El progreso guardado NO se borra.')) return;
  plan = buildDefaultRoutine();
  await savePlan();
  showToast('✅ Plan regenerado. Los IDs ahora coinciden con el progreso guardado.');
  renderModal();
}

async function changeAdminPw(){

// ── CHART SCREEN ──
let exPickerOpen=false;

function renderChart(){
  const trList=tracked||DEFAULT_TRACKED;
  if(!ST.chartEx) ST.chartEx=trList[0]?.name||null;

  // Build per-week best weight for selected exercise (max across all series of all matching exercises)
  const weekData=plan.map((wd,wi)=>{
    let maxW=null; let hasAny=false;
    wd.days.forEach(day=>{
      day.blocks.forEach(block=>{
        block.exercises.forEach(ex=>{
          const name=ex.type==='single'?ex.name:(ex.parts?ex.parts.map(p=>p.name).join(' '):null);
          const names=ex.type==='single'?[ex.name]:(ex.parts?ex.parts.map(p=>p.name):[]);
          names.forEach(n=>{
            if(!matchTracked(n,[{name:ST.chartEx,matchTerms:[ST.chartEx.toLowerCase()]}])) return;
            if(ex.type==='single'){
              ex.sets.forEach((_,si)=>{
                const d=progress[`${ex.id}_s${si}`];
                if(d&&d.weight){ hasAny=true; const w=parseFloat(d.weight); if(!isNaN(w)&&(maxW===null||w>maxW)) maxW=w; }
              });
            } else {
              for(let si=0;si<ex.count;si++){
                ex.parts.forEach(p=>{
                  if(!matchTracked(p.name,[{name:ST.chartEx,matchTerms:[ST.chartEx.toLowerCase()]}])) return;
                  const d=progress[`${ex.id}_${p.pid}_s${si}`];
                  if(d&&d.weight){ hasAny=true; const w=parseFloat(d.weight); if(!isNaN(w)&&(maxW===null||w>maxW)) maxW=w; }
                });
              }
            }
          });
        });
      });
    });
    return {week:wd.week, wi, maxW, hasAny};
  });

  const withData=weekData.filter(d=>d.maxW!==null);
  const allWeights=withData.map(d=>d.maxW);
  const bestW=allWeights.length?Math.max(...allWeights):null;
  const firstW=withData.length?withData[0].maxW:null;
  const gain=bestW&&firstW?Math.round((bestW-firstW)*10)/10:null;

  // SVG line chart
  let svgHTML='';
  if(withData.length>=2){
    const PAD_L=38,PAD_R=10,PAD_T=16,PAD_B=22,W=290,H=110;
    const chartW=W-PAD_L-PAD_R, chartH=H-PAD_T-PAD_B;
    const minW=Math.min(...allWeights)*0.97;
    const maxWChart=Math.max(...allWeights)*1.02;
    const xStep=chartW/(plan.length-1||1);
    const yScale=(v)=>PAD_T+chartH-(((v-minW)/(maxWChart-minW||1))*chartH);
    const xPos=(wi)=>PAD_L+wi*xStep;
    const pts=weekData.map(d=>({x:xPos(d.wi),y:d.maxW!==null?yScale(d.maxW):null,d}));
    const linePts=pts.filter(p=>p.y!==null);
    const polyline=linePts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    const areaPath=linePts.length?`M${linePts[0].x.toFixed(1)},${(PAD_T+chartH).toFixed(1)} `+linePts.map(p=>`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')+` L${linePts[linePts.length-1].x.toFixed(1)},${(PAD_T+chartH).toFixed(1)} Z`:'';
    // Y grid labels (3 lines)
    const yLabels=[minW,minW+(maxWChart-minW)*0.5,maxWChart].map(v=>({v:Math.round(v),y:yScale(v)}));
    const gridLines=yLabels.map(l=>`<line x1="${PAD_L}" y1="${l.y.toFixed(1)}" x2="${W-PAD_R}" y2="${l.y.toFixed(1)}" stroke="#2a2a2f" stroke-width="1"/><text x="${(PAD_L-3).toFixed(1)}" y="${(l.y+3).toFixed(1)}" fill="#68686f" font-size="8" text-anchor="end" font-family="Inter">${l.v}</text>`).join('');
    const xLabels=weekData.map(d=>`<text x="${xPos(d.wi).toFixed(1)}" y="${(PAD_T+chartH+12).toFixed(1)}" fill="${d.maxW!==null?'#f05a28':'#68686f'}" font-size="8" text-anchor="middle" font-family="Inter" ${d.maxW!==null?'font-weight="700"':''}>S${d.week}</text>`).join('');
    const dots=pts.filter(p=>p.y!==null).map((p,i)=>{
      const isLast=i===linePts.length-1; const isPr=p.d.maxW===bestW;
      return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${isPr?5:3.5}" fill="#f05a28" ${isPr?'stroke="#0a0a0b" stroke-width="2"':''}/>`;
    }).join('');
    // Tooltip on best point
    const bestPt=linePts.find(p=>p.d.maxW===bestW);
    const tooltip=bestPt?`<rect x="${(bestPt.x-22).toFixed(1)}" y="${(bestPt.y-20).toFixed(1)}" width="44" height="16" rx="4" fill="#f05a28"/><text x="${bestPt.x.toFixed(1)}" y="${(bestPt.y-9).toFixed(1)}" fill="white" font-size="9" font-weight="700" font-family="Oswald" text-anchor="middle">${bestW} kg</text>`:'';
    svgHTML=`<svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f05a28"/><stop offset="100%" stop-color="#ff7043"/></linearGradient>
        <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f05a28" stop-opacity="0.2"/><stop offset="100%" stop-color="#f05a28" stop-opacity="0"/></linearGradient>
      </defs>
      ${gridLines}${xLabels}
      <path d="${areaPath}" fill="url(#ag)"/>
      <polyline points="${polyline}" fill="none" stroke="url(#cg)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}${tooltip}
    </svg>`;
  } else {
    svgHTML=`<div style="text-align:center;padding:24px 0;color:var(--text3);font-size:12px">Completá al menos 2 semanas para ver el gráfico</div>`;
  }

  // Detail for selected week
  const selWd=plan[ST.chartWeek];
  let seriesRows='';
  let maxSerW=0;
  selWd.days.forEach(day=>{
    day.blocks.forEach(block=>{
      block.exercises.forEach(ex=>{
        const names=ex.type==='single'?[{name:ex.name,id:ex.id,type:'single',sets:ex.sets}]:(ex.parts||[]).map(p=>({name:p.name,id:`${ex.id}_${p.pid}`,type:'part',count:ex.count,pid:p.pid,exId:ex.id,r:p.r}));
        names.forEach(n=>{
          if(!matchTracked(n.name,[{name:ST.chartEx,matchTerms:[ST.chartEx.toLowerCase()]}])) return;
          if(n.type==='single'){
            n.sets.forEach((_,si)=>{
              const d=progress[`${n.id}_s${si}`];
              const w=d&&d.weight?parseFloat(d.weight):null;
              if(w&&w>maxSerW) maxSerW=w;
            });
            n.sets.forEach((s,si)=>{
              const d=progress[`${n.id}_s${si}`];
              const w=d&&d.weight?parseFloat(d.weight):null;
              const pct=w&&maxSerW?Math.round(w/maxSerW*100):0;
              seriesRows+=`<div class="chart-series-row">
                <div class="chart-s-num">SERIE ${si+1}</div>
                <div class="chart-s-bar-wrap"><div class="chart-s-bar" style="width:${pct}%"></div></div>
                <div class="chart-s-val">${w?w+' kg':'—'}</div>
                <div class="chart-s-check">${d&&d.done?'✓':''}</div>
              </div>`;
            });
          } else {
            for(let si=0;si<n.count;si++){
              const d=progress[`${n.exId}_${n.pid}_s${si}`];
              const w=d&&d.weight?parseFloat(d.weight):null;
              if(w&&w>maxSerW) maxSerW=w;
            }
            for(let si=0;si<n.count;si++){
              const d=progress[`${n.exId}_${n.pid}_s${si}`];
              const w=d&&d.weight?parseFloat(d.weight):null;
              const pct=w&&maxSerW?Math.round(w/maxSerW*100):0;
              seriesRows+=`<div class="chart-series-row">
                <div class="chart-s-num">SERIE ${si+1}</div>
                <div class="chart-s-bar-wrap"><div class="chart-s-bar" style="width:${pct}%"></div></div>
                <div class="chart-s-val">${w?w+' kg':'—'}</div>
                <div class="chart-s-check">${d&&d.done?'✓':''}</div>
              </div>`;
            }
          }
        });
      });
    });
  });

  const weekTabs=plan.map((wd,wi)=>{
    const hasD=weekData[wi]&&weekData[wi].hasAny;
    return `<div class="chart-week-tab ${wi===ST.chartWeek?'active':''} ${hasD?'done':''}" onclick="ST.chartWeek=${wi};render()">S${wd.week}</div>`;
  }).join('');

  const pickerHTML=exPickerOpen?`<div class="ex-picker-overlay" onclick="exPickerOpen=false;render()">
    <div class="ex-picker" onclick="event.stopPropagation()">
      <div class="ex-picker-handle"></div>
      ${(tracked||DEFAULT_TRACKED).map(t=>`<div class="ex-picker-item ${t.name===ST.chartEx?'selected':''}" onclick="ST.chartEx='${escH(t.name)}';exPickerOpen=false;ST.chartWeek=0;render()">${escH(t.name)}</div>`).join('')}
    </div>
  </div>`:'';

  return `${navBarHTML()}
    ${pickerHTML}
    <div class="page-tabbed">
      <div class="chart-ex-selector" onclick="exPickerOpen=true;render()">
        <div>
          <div style="font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px">Ejercicio</div>
          <div class="chart-ex-name">${escH((ST.chartEx||'').toUpperCase())}</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#68686f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="chart-stat-row">
        <div class="chart-stat"><div class="chart-stat-label">Mejor peso</div><div class="chart-stat-val hi">${bestW?bestW+'<span style="font-size:11px;color:var(--text3)">kg</span>':'—'}</div></div>
        <div class="chart-stat"><div class="chart-stat-label">Progreso</div><div class="chart-stat-val gr">${gain!==null?(gain>0?'+':'')+gain+'<span style="font-size:11px;color:var(--text3)">kg</span>':'—'}</div></div>
        <div class="chart-stat"><div class="chart-stat-label">Semanas</div><div class="chart-stat-val">${withData.length}<span style="font-size:11px;color:var(--text3)">/${plan.length}</span></div></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-wrap-title">EVOLUCIÓN — PESO MÁXIMO POR SEMANA</div>
        ${svgHTML}
      </div>
      <div class="admin-section-title" style="margin-bottom:10px">DETALLE POR SEMANA</div>
      <div class="chart-week-tabs">${weekTabs}</div>
      ${seriesRows?`<div class="chart-series-card"><div class="chart-series-hdr">SEMANA ${selWd.week} · ${escH(ST.chartEx.toUpperCase())}</div>${seriesRows}</div>`:`<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px 0">Sin registros en la Semana ${selWd.week}</div>`}
    </div>
    ${tabBarHTML()}`;
}

function render(){
  const app=document.getElementById('app');
  if(!session){ app.innerHTML=renderAuth(); return; }
  if(session.uid==='__pending__'){ app.innerHTML=renderPending(); return; }
  // Main tab routing
  if(ST.mainTab==='prs')   { app.innerHTML=renderPrs(); return; }
  if(ST.mainTab==='chart') { app.innerHTML=renderChart(); return; }
  // Plan tab
  if(ST.view==='home')    { app.innerHTML=renderHome(); return; }
  if(ST.view==='week')    { app.innerHTML=renderWeek(); return; }
  if(ST.view==='day')     { app.innerHTML=renderDay(); return; }
  if(ST.view==='workout') { app.innerHTML=renderWorkout(); return; }
}

// ============================================================
// INIT
// ============================================================
let __fsInitDone=false;
window.__fsAppInit = async function(){
  if(__fsInitDone) return;
  __fsInitDone=true;
  loadSession();
  await loadUsers();
  await loadPlan();
  await loadRpeInfo();
  await loadTracked();
  if(session && session.uid!=='__pending__') await loadPrs();
  if(session && session.uid!=='__pending__') await loadProgress();
  render();
};

// Try immediately in case Firebase module already loaded by the time we get here;
// also called again from the Firebase module script once it's ready.
window.__fsAppInit();
</script>
<script type="module">
// ============================================================
// FIREBASE INIT (Firestore as shared/personal cloud storage)
// ============================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6iwVIKL_uKzneUfjmEpTEbH_OSm5FuYw",
  authDomain: "fusion-studio-app.firebaseapp.com",
  projectId: "fusion-studio-app",
  storageBucket: "fusion-studio-app.firebasestorage.app",
  messagingSenderId: "331263488503",
  appId: "1:331263488503:web:48a97d6a62856bd5bf3ef2"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// Single collection "fusion_data", each document keyed by our storage key.
// Document shape: { value: <JSON string> }
window.__fsCloudGet = async function(key){
  try{
    const ref = doc(db, "fusion_data", key);
    const snap = await getDoc(ref);
    if(!snap.exists()) return null;
    const data = snap.data();
    return data && typeof data.value === 'string' ? data.value : null;
  }catch(e){ console.error('Firestore get error', key, e); return null; }
};

window.__fsCloudSet = async function(key, valueStr){
  try{
    const ref = doc(db, "fusion_data", key);
    await setDoc(ref, { value: valueStr, updatedAt: Date.now() });
    return true;
  }catch(e){ console.error('Firestore set error', key, e); return false; }
};

window.__fsCloudReady = true;
</script>
